# Site settings -----------------------------------------------------------
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default"

title: "Matthew Chuang"
name: "Matthew Chuang"
description: >-
  Quantitative strategist at Goldman Sachs. Research and side projects on
  systematic trading, prediction markets, and applied machine learning.
url: "https://mattioch.github.io"
baseurl: ""
repository: "MattioCh/MattioCh.github.io"

# Build settings -----------------------------------------------------------
markdown: kramdown
locale: "en-US"
search: true

# Outputting
permalink: /:categories/:title/
timezone: Asia/Hong_Kong

include:
  - _pages

exclude:
  - Aidan_20260513.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .github
  - README.md

# Plugins (GitHub Pages whitelisted) --------------------------------------
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-remote-theme
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-remote-theme
  - jekyll-redirect-from
  - jemoji

# Site Author --------------------------------------------------------------
author:
  name: "Matthew Chuang"
  avatar: "/images/bio-photo.jpg"
  bio: "Working on Loop Engineering"
  location: "Hong Kong"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:matthewchuang19@gmail.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/MattioCh"

# Site Footer --------------------------------------------------------------
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/MattioCh"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:matthewchuang19@gmail.com"

# Collections --------------------------------------------------------------
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/

# Defaults -----------------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: false
      excerpt: ""
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed
